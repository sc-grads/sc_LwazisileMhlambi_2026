name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        working-directory: "GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project"
        run: npm ci

      - name: Lint code
        working-directory: "GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project"
        run: npm run lint

      - name: Test code
        working-directory: "GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project"
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: Install dependencies
        working-directory: "GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project"
        run: npm ci

      - name: Build website
        working-directory: "GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project"
        run: npm run build

      - name: Publish JS filename
        id: publish
        run: find GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project/dist/assets*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: GitHub Actions Course/GitHub Actions/Section 5 Project/01 Starting Project/dist
          #path: |
            #dist
            #package.json

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files

      - name: Output contents
        run: ls
      
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}"

      - name: Deploy
        run: echo "Deploying..."
