name: Deployment Sectoion 6
on:
  push:
    

env:
  MONGODB_DB_NAME: gha-demo
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: cluster0.vzqgbus.mongodb.net
      MONGODB_USERNAME: root
      MONGODB_PASSWORD: root
      PORT: 8080

    environment: testing
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        working-directory: "GitHub Actions Course/GitHub Actions/Section 6 Project/01 Starting Project"
        run: npm ci

      - name: Run server
        working-directory: "GitHub Actions Course/GitHub Actions/Section 6 Project/01 Starting Project"
        run: npm start & npx wait-on http://127.0.0.1:$PORT

      - name: Run tests
        working-directory: "GitHub Actions Course/GitHub Actions/Section 6 Project/01 Starting Project"
        run: npm test

      - name: Output information
        run: |
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
        
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          ech "MONGODB_DB_NAME: $MONGODB_DB_NAME"
