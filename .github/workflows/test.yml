name: Test Project

on: push

jobs:

    test:
        runs-on: ubuntu-latest

        steps:
            - name: Get code
              uses: actions/checkout@v3

            - name: Install NodeJS
              uses: actions/setup-node@v3
              with:
                    node-version: 24

            - name: Install dependencies
              working-directory: "GitHub Actions/02+Starting+Project/02 Starting Project"
              run: npm ci

            - name: Run tests
              working-directory: "GitHub Actions/02+Starting+Project/02 Starting Project"
              run: npm test

                    
